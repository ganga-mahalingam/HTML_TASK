<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <header>
        <h3 align="center">Student Marksheet</h3>
        <table align="center" border="1px">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Max Marks</th>
                    <th>Marks</th>
                    <th>Grade</th>
                </tr>
                 </thead>
                 <tbody>
                <tr>
                    <td>Maths</td>
                    <td>100</td>
                    <td>85</td>
                    <td>A</td>
                </tr>
                <tr>
                    <td>Science</td>
                    <td>100</td>
                    <td>90</td>
                    <td>A</td>
                </tr>
                <tr >
                    <td>English</td>
                    <td>100</td>
                    <td>75</td>
                    <td>B</td>
                </tr>
                <tr>
                    <td>History</td>
                    <td>100</td>
                    <td>80</td>
                    <td>B</td>
                </tr>
                
           </tbody>
           <tfoot>
            <tr >
                <td colspan="2"><b>Total</b></td>
                <td><b>330</b></td>
                <td><b>A</b></td>

            </tr>
           </tfoot>
            
        </table>
    </header>
    
</body>
</html>
